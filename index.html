<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWABidAsk | Real-World Asset Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD8fH0T_6oxcvlqAXUItA6MNAUE-QJ0ZJw&v=alpha&libraries=maps3d,places"></script>
<style>
 /* This forces the Google search results to pop to the very front */
.pac-container {
    z-index: 10000 !important;
    background-color: #050810; /* Match your dark theme */
    border: 1px solid #00ff00;
    color: #fff;
}
.pac-item {
    color: #fff;
    border-top: 1px solid #1a2840;
}
.pac-item:hover {
    background-color: #1a2840;
}
.pac-item-query {
    color: #00ff00; /* Makes the address text green like your theme */
}
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050810; --bg2: #0a0f1e; --bg3: #0f1628; --panel: #0d1220;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #e8ecf4; --muted: #5a6280; --dim: #8892aa;
    --accent: #00d4aa; --accent2: #4080ff; --warn: #ff6b35;
    --gold: #f5c842; --green: #00c47a; --red: #ff4560;
    --font-head: 'Syne', sans-serif; --font-mono: 'Space Mono', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow: hidden; }
  #app { display: grid; grid-template-rows: 52px 1fr; grid-template-columns: 320px 1fr 340px; height: 100vh; }

  /* TOPBAR */
  #topbar { grid-column: 1 / -1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; z-index: 100; }
  .logo { padding: 0 20px; font-family: var(--font-head); font-weight: 800; font-size: 17px; color: var(--accent); border-right: 1px solid var(--border); height: 100%; display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--text); opacity: 0.6; font-weight: 400; font-size: 12px; letter-spacing: 2px; }
  .top-search { flex: 1; display: flex; align-items: center; padding: 0 16px; border-right: 1px solid var(--border); height: 100%; }
  .top-search input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--font-mono); font-size: 12px; }
  .top-stats { display: flex; height: 100%; }
  .top-stat { padding: 0 18px; display: flex; flex-direction: column; justify-content: center; border-right: 1px solid var(--border); }
  .ts-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .ts-val { font-size: 13px; font-weight: 700; color: var(--accent); }
  .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; padding: 0 12px; }

  /* PANELS */
  #left-panel, #right-panel { background: var(--panel); overflow: hidden; display: flex; flex-direction: column; }
  #left-panel { border-right: 1px solid var(--border); }
  #right-panel { border-left: 1px solid var(--border); }
  .listings { flex: 1; overflow-y: auto; }
  .listing-card { padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .listing-card:hover, .listing-card.selected { background: rgba(255,255,255,0.03); }
  .listing-card.selected { border-left: 2px solid var(--accent); }
  
  /* GLOBE / SEARCH */
  #globe-container { position: relative; background: #000; }
  #asset-search-wrapper { position: absolute; top: 20px; left: 20px; z-index: 1000; width: 300px; }
  #asset-search { width: 100%; padding: 12px; border: 1px solid var(--accent); background: rgba(0,0,0,0.85); color: var(--accent); font-family: var(--font-mono); outline: none; box-shadow: 0 0 15px rgba(0,212,170,0.2); }

  /* TICKER & FOOTER */
  #ticker { position: fixed; bottom: 34px; left: 0; right: 0; height: 24px; background: var(--bg2); border-top: 1px solid var(--border); z-index: 50; display: flex; align-items: center; overflow: hidden; }
  .ticker-inner { display: flex; gap: 40px; animation: scroll 60s linear infinite; font-size: 10px; color: var(--muted); }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  
  footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; color: #555; text-align: center; padding: 8px; font-size: 10px; border-top: 1px solid var(--border); z-index: 10000; }

  /* BUTTONS */
  .btn-list { background: var(--accent); color: #000; border: none; padding: 7px 16px; font-weight: 700; cursor: pointer; }
  .btn-kyc { background: none; border: 1px solid var(--border2); color: var(--dim); padding: 6px 14px; cursor: pointer; }
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div class="logo">RWABidAsk <span>EXCHANGE</span></div>
    <div class="top-search"><input type="text" placeholder="Global Ledger Search..."></div>
    <div class="top-stats">
      <div class="top-stat"><div class="ts-label">Listed</div><div class="ts-val" id="stat-listed">15</div></div>
      <div class="top-stat"><div class="ts-label">Total Cap</div><div class="ts-val" id="stat-cap">$84.2M</div></div>
    </div>
    <div class="top-actions">
      <button class="btn-kyc">KYC / Login</button>
      <button class="btn-list">+ List Asset</button>
    </div>
  </div>

  <div id="left-panel">
    <div class="listings" id="listings-container"></div>
  </div>

  <div id="globe-container">
    <div id="asset-search-wrapper">
      <input type="text" id="asset-search" placeholder="GOTO ASSET (e.g. Dubai, London)...">
    </div>
    <gmp-map-3d 
  mode="satellite" 
  center="25.1972, 55.2744, 500" 
  tilt="65" 
  range="5000">
</gmp-map-3d>

  <div id="right-panel">
    <div id="detail-header" style="padding: 20px; border-bottom: 1px solid var(--border);">
        <h2 id="d-name">Select Asset</h2>
        <p id="d-loc" style="color:var(--muted)">Market Data Live</p>
    </div>
    <div id="detail-body" style="padding: 20px;">
        <p style="opacity: 0.5;">Awaiting selection from distributed ledger...</p>
    </div>
  </div>
</div>

<div id="ticker"><div class="ticker-inner" id="ticker-inner"></div></div>

<footer>
    © 2026 Annie Group LLC. RWABidAsk is a trade name of Annie Group LLC. | Institutional Grade RWA Exchange | Built for Solarmerica Inc.
</footer>

<script>
const LISTINGS = [
  { id:1, name:"Beachfront Villa", city:"Marbella", country:"Spain", ask:4200000, bid:3800000 },
  { id:9, name:"Luxury Penthouse", city:"Dubai", country:"UAE", ask:9200000, bid:8500000 },
  { id:11, name:"Medieval Castle", city:"Loire Valley", country:"France", ask:18500000, bid:16000000 }
];

function fmt(n) { return '$' + (n/1e6).toFixed(1) + 'M'; }

function renderListings() {
  const c = document.getElementById('listings-container');
  c.innerHTML = LISTINGS.map(l => `
    <div class="listing-card" onclick="selectListing(${l.id})">
      <div style="font-weight:bold">${l.name}</div>
      <div style="font-size:10px; color:var(--muted)">${l.city}, ${l.country}</div>
      <div style="color:var(--accent); font-size:12px; margin-top:4px">ASK: ${fmt(l.ask)}</div>
    </div>
  `).join('');
}

function selectListing(id) {
  const l = LISTINGS.find(x => x.id === id);
  document.getElementById('d-name').textContent = l.name;
  document.getElementById('d-loc').textContent = `${l.city}, ${l.country}`;
  document.getElementById('detail-body').innerHTML = `
    <div style="background:var(--bg3); padding:15px; border-radius:4px;">
        <div style="color:var(--muted); font-size:10px;">TOP BID</div>
        <div style="color:var(--red); font-size:20px; font-weight:bold;">${fmt(l.bid)}</div>
        <hr style="margin:10px 0; border:0; border-top:1px solid var(--border);">
        <button style="width:100%; padding:10px; background:var(--green); border:0; font-weight:bold; cursor:pointer;">EXECUTE BUY</button>
    </div>
  `;
}

function buildTicker() {
  const items = [...LISTINGS, ...LISTINGS].map(l => 
    `<span>${l.name}: <span style="color:var(--green)">${fmt(l.ask)}</span></span>`
  ).join(' — ');
  document.getElementById('ticker-inner').innerHTML = items + ' — ' + items;
}

// ── FLIGHT CONTROLLER ──
const searchInput = document.getElementById('asset-search');
const map3D = document.querySelector('gmp-map-3d');

// ── RWABidAsk CORE ENGINE ──

// 1. Initialize the NEW Places Autocomplete & Map Controls
async function initRWACore() {
    const { PlaceAutocompleteElement } = await google.maps.importLibrary("places");
    const map3D = document.querySelector('gmp-map-3d');
    
    // This finds your search container and injects the modern search widget
    const searchContainer = document.querySelector('.top-search');
    const autocompleteWidget = new PlaceAutocompleteElement();
    
    // Style the widget to match your professional aesthetic
    autocompleteWidget.setAttribute('placeholder', 'Search Global Assets...');
    searchContainer.appendChild(autocompleteWidget);

    // 2. The "BOOM" Moment: When an address is selected
    autocompleteWidget.addEventListener('gmp-placeselect', async (e) => {
        const place = e.detail.place;
        
        // Fetching real-world coordinates and address data
        await place.fetchFields({ fields: ['location', 'displayName', 'formattedAddress'] });

        if (place.location) {
            // Smoothly fly to the real estate asset
            map3D.flyCameraTo({
                endCamera: { 
                    center: { lat: place.location.lat(), lng: place.location.lng(), altitude: 100 }, 
                    tilt: 65, 
                    range: 1200 
                },
                durationMillis: 2500 
            });

            // Update the Right Panel with Real Data
            document.getElementById('right-panel').innerHTML = `
                <h3 style="color:#00ff00;">RWABidAsk | LIVE</h3>
                <p style="font-size:11px; color:#fff;">${place.formattedAddress}</p>
                <hr style="border:0.5px solid var(--border);">
                <div id="d-price" style="font-size:22px;">ASK: $${(Math.random() * 5 + 1).toFixed(2)}M</div>
                <div id="d-bid" style="font-size:22px; color:#00ff00;">BID: $${(Math.random() * 4 + 1).toFixed(2)}M</div>
                <button style="width:100%; margin-top:15px; padding:10px; background:#00ff00; color:#000; font-weight:bold; border:none; cursor:pointer;">PLACE BID</button>
            `;
        }
    });

    // 3. Keep the Click Listener for Manual Targeting
    map3D.addEventListener('gmp-click', (event) => {
        const { lat, lng } = event.position;
        console.log(`Manual Asset Lock: ${lat}, ${lng}`);
        document.getElementById('d-price').innerText = `ASK: $${(Math.random() * 10).toFixed(1)}M`;
        document.getElementById('d-bid').innerText = `BID: $${(Math.random() * 8).toFixed(1)}M`;
    });
}

// Start the engine
initRWACore();

// 3. Simulating the "Bid/Ask" Tick (Precision Version)
setInterval(() => {
    const bidElement = document.getElementById('d-bid');
    if (bidElement) {
        // Remove everything except numbers and decimals
        const currentText = bidElement.innerText.replace(/[^0-9.]/g, '');
        const currentBid = parseFloat(currentText) || 8500000; 
        
        // Fluctuate by a smaller amount to look like real institutional trading
        const fluctuation = (Math.random() - 0.5) * 5000;
        const newBid = Math.floor(currentBid + fluctuation);
        
        // Update the display with clean formatting
        bidElement.innerText = `BID: $${newBid.toLocaleString()}`;
    }
}, 3000);
renderListings();
buildTicker();
</script>
</body>
</html>
