<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWABidAsk — Global Property Exchange</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0e12;
  --surface: #13161c;
  --surface2: #1a1e26;
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text: #e2e6ed;
  --text-muted: #6b7280;
  --text-dim: #9ca3af;
  --accent: #10b981;
  --accent-dim: rgba(16,185,129,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --orange: #f97316;
  --orange-dim: rgba(249,115,22,0.12);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

/* Layout */
#app { display: grid; grid-template-columns: 300px 1fr 320px; grid-template-rows: 48px 1fr; height: 100vh; }

/* Topbar */
#topbar {
  grid-column: 1/-1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 20px; height: 100%;
  border-right: 1px solid var(--border);
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  color: var(--accent); letter-spacing: -0.3px; white-space: nowrap;
}
.logo-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.search-wrap {
  flex: 1; display: flex; align-items: center; gap: 8px;
  padding: 0 16px; height: 100%;
  border-right: 1px solid var(--border);
}
.search-wrap svg { flex-shrink: 0; color: var(--text-muted); }
#search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--sans); font-size: 13px;
}
#search-input::placeholder { color: var(--text-muted); }
.topbar-stats { display: flex; height: 100%; }
.ts {
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 16px; border-right: 1px solid var(--border);
  cursor: default;
}
.ts-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.ts-val { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); }
.ts-val.green { color: var(--accent); }
.topbar-actions { display: flex; align-items: center; gap: 8px; padding: 0 14px; margin-left: auto; }
.btn-primary {
  background: var(--accent); color: #000; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  padding: 7px 14px; border-radius: 4px; transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-ghost {
  background: none; color: var(--text-dim); border: 1px solid var(--border-strong);
  cursor: pointer; font-family: var(--sans); font-size: 12px;
  padding: 6px 12px; border-radius: 4px; transition: all .15s;
}
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.25); }

/* Left panel */
#left {
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-head {
  padding: 12px 14px 0;
  border-bottom: 1px solid var(--border);
}
.panel-tabs { display: flex; gap: 0; margin-bottom: -1px; }
.tab {
  padding: 8px 10px; font-size: 11px; font-weight: 500; cursor: pointer;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text-dim); }
.filter-bar {
  display: flex; gap: 6px; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
  padding: 3px 10px; font-size: 11px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--border-strong); border-radius: 20px; color: var(--text-muted);
  background: none; font-family: var(--sans); white-space: nowrap; transition: all .15s;
}
.chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chip:hover:not(.active) { color: var(--text-dim); border-color: rgba(255,255,255,.2); }

.listings { flex: 1; overflow-y: auto; }
.listings::-webkit-scrollbar { width: 3px; }
.listings::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.card {
  padding: 13px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s; position: relative;
}
.card:hover { background: rgba(255,255,255,.02); }
.card.active { background: rgba(16,185,129,.04); border-left: 2px solid var(--accent); padding-left: 12px; }
.card-badge {
  display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: .8px;
  text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-bottom: 6px;
}
.badge-residential { background: var(--blue-dim); color: var(--blue); }
.badge-commercial { background: var(--amber-dim); color: var(--amber); }
.badge-land { background: var(--accent-dim); color: var(--accent); }
.badge-business { background: var(--orange-dim); color: var(--orange); }
.card-row { display: flex; justify-content: space-between; align-items: flex-start; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.35; }
.card-price { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; margin-left: 8px; }
.card-loc { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
.card-spread { display: flex; gap: 10px; margin-top: 7px; align-items: center; }
.spread-item { font-family: var(--mono); font-size: 10px; }
.spread-bid { color: var(--red); }
.spread-ask { color: var(--accent); }
.spread-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-right: 3px; }
.card-source { font-size: 9px; color: var(--text-muted); margin-top: 5px; font-family: var(--mono); }

/* Map */
#map-wrap { position: relative; }
#map { width: 100%; height: 100%; }

.map-controls {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; z-index: 10;
}
.mc-btn {
  background: rgba(13,16,22,.92); border: 1px solid var(--border-strong);
  color: var(--text-muted); font-family: var(--sans); font-size: 11px; font-weight: 500;
  padding: 7px 13px; cursor: pointer; border-radius: 4px;
  backdrop-filter: blur(8px); transition: all .15s;
}
.mc-btn.active, .mc-btn:hover { color: var(--accent); border-color: var(--accent); }

.map-legend {
  position: absolute; top: 14px; left: 14px; z-index: 10;
  background: rgba(13,16,22,.88); border: 1px solid var(--border-strong);
  padding: 10px 12px; border-radius: 6px; backdrop-filter: blur(8px);
}
.legend-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.legend-row { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; font-size: 10px; color: var(--text-dim); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.heatmap-legend {
  position: absolute; top: 14px; right: 14px; z-index: 10;
  background: rgba(13,16,22,.88); border: 1px solid var(--border-strong);
  padding: 10px 12px; border-radius: 6px; backdrop-filter: blur(8px);
  display: none;
}
.hm-gradient { height: 6px; border-radius: 3px; background: linear-gradient(to right,#3b82f6,#10b981,#f59e0b,#ef4444); margin: 7px 0; width: 140px; }
.hm-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-muted); font-family: var(--mono); }

/* Right panel */
#right {
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.detail-top {
  padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.detail-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-muted); text-align: center; gap: 10px;
}
.detail-empty-icon { font-size: 32px; opacity: .2; }
.detail-empty p { font-size: 12px; line-height: 1.7; }
.d-type-badge { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-bottom: 8px; }
.d-name { font-size: 17px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.d-loc { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
.d-price-row { display: flex; justify-content: space-between; align-items: flex-end; }
.d-price { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--accent); }
.d-psf { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

.detail-scroll { flex: 1; overflow-y: auto; }
.detail-scroll::-webkit-scrollbar { width: 3px; }
.detail-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); }
.detail-inner { padding: 14px 16px; }

.ba-box {
  background: var(--surface2); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 14px; margin-bottom: 14px;
}
.ba-cols { display: flex; }
.ba-col { flex: 1; text-align: center; }
.ba-col-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 5px; }
.ba-col-val { font-family: var(--mono); font-size: 17px; font-weight: 500; }
.bid-color { color: var(--red); }
.ask-color { color: var(--accent); }
.ba-divider { width: 1px; background: var(--border); margin: 0 8px; }
.spread-info { text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-family: var(--mono); font-size: 10px; color: var(--text-muted); }

.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 16px; }
.action-btn {
  padding: 9px 8px; font-family: var(--sans); font-size: 12px; font-weight: 600;
  cursor: pointer; border-radius: 4px; border: none; transition: opacity .15s;
  text-align: center;
}
.action-btn:hover { opacity: .85; }
.a-buy { background: var(--accent); color: #000; }
.a-bid { background: none; border: 1px solid var(--accent); color: var(--accent); }
.a-contact { background: none; border: 1px solid var(--border-strong); color: var(--text-dim); }
.a-save { background: none; border: 1px solid var(--border-strong); color: var(--text-dim); }

.section { margin-bottom: 16px; }
.section-title { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
.data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.data-key { color: var(--text-muted); }
.data-val { color: var(--text); font-weight: 500; font-family: var(--mono); font-size: 11px; }
.data-val.source { color: var(--text-muted); font-size: 10px; font-family: var(--sans); }

.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { font-size: 10px; color: var(--text-muted); width: 80px; flex-shrink: 0; }
.bar-track { flex: 1; height: 3px; background: var(--border-strong); border-radius: 2px; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-stat { font-family: var(--mono); font-size: 10px; width: 45px; text-align: right; flex-shrink: 0; }

.ai-brief {
  background: var(--surface2); border-left: 2px solid var(--accent);
  padding: 11px 13px; border-radius: 0 4px 4px 0;
  font-size: 11px; color: var(--text-dim); line-height: 1.75;
}
.ai-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 6px; font-weight: 600; }

/* Source verified badge */
.verified { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text-muted); margin-bottom: 12px; }
.verified-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }

/* Tooltip */
#tt {
  position: fixed; pointer-events: none; z-index: 100;
  background: rgba(13,16,22,.96); border: 1px solid var(--border-strong);
  border-radius: 6px; padding: 10px 12px; display: none;
  backdrop-filter: blur(8px); min-width: 180px;
}
#tt.show { display: block; }
.tt-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.tt-price { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 2px; }
.tt-loc { font-size: 10px; color: var(--text-muted); }

/* Modal */
#modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
#modal.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: 8px; width: 440px; max-width: 95vw; padding: 28px;
}
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
.field input, .field select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border-strong);
  border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 13px;
  padding: 8px 11px; outline: none; transition: border-color .15s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-muted); }
.field select option { background: var(--surface); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-footer { display: flex; gap: 8px; margin-top: 20px; }
.modal-submit { flex: 1; padding: 10px; background: var(--accent); color: #000; border: none; cursor: pointer; font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 4px; transition: opacity .15s; }
.modal-submit:hover { opacity: .85; }
.modal-cancel { padding: 10px 16px; background: none; border: 1px solid var(--border-strong); color: var(--text-muted); cursor: pointer; font-family: var(--sans); font-size: 13px; border-radius: 4px; transition: all .15s; }
.modal-cancel:hover { color: var(--text); }

/* Notification */
#notif {
  position: fixed; top: 58px; right: 16px; z-index: 300;
  background: var(--surface2); border: 1px solid var(--accent);
  border-radius: 6px; padding: 11px 16px; font-size: 12px; color: var(--accent);
  display: none; animation: fadeSlide .25s ease;
}
@keyframes fadeSlide { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

/* Ticker */
#ticker {
  position: fixed; bottom: 0; left: 0; right: 0; height: 26px;
  background: var(--surface); border-top: 1px solid var(--border);
  overflow: hidden; z-index: 50; display: flex; align-items: center;
}
.ticker-inner {
  display: flex; gap: 32px; white-space: nowrap;
  animation: scroll-l 80s linear infinite; font-family: var(--mono); font-size: 10px;
}
.ti { color: var(--text-muted); }
.ti .p { margin-left: 5px; }
.ti .p.up { color: var(--accent); }
.ti .p.dn { color: var(--red); }
@keyframes scroll-l { from { transform: translateX(0); } to { transform: translateX(-50%); } }
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    RWABidAsk
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Search city, country, address, business type…">
  </div>
  <div class="topbar-stats">
    <div class="ts"><div class="ts-label">Listed</div><div class="ts-val green" id="s-count">—</div></div>
    <div class="ts"><div class="ts-label">Countries</div><div class="ts-val">47</div></div>
    <div class="ts"><div class="ts-label">Market Cap</div><div class="ts-val green" id="s-cap">—</div></div>
    <div class="ts"><div class="ts-label">Bids 24h</div><div class="ts-val green">2,841</div></div>
  </div>
  <div class="topbar-actions">
    <button class="btn-ghost" onclick="openModal('kyc')">Verify / KYC</button>
    <button class="btn-primary" onclick="openModal('list')">+ List Asset</button>
  </div>
</div>

<!-- LEFT PANEL -->
<div id="left">
  <div class="panel-head">
    <div class="panel-tabs">
      <div class="tab active" onclick="setTab(this,'all')">All</div>
      <div class="tab" onclick="setTab(this,'residential')">Residential</div>
      <div class="tab" onclick="setTab(this,'commercial')">Commercial</div>
      <div class="tab" onclick="setTab(this,'business')">Business</div>
      <div class="tab" onclick="setTab(this,'land')">Land</div>
    </div>
  </div>
  <div class="filter-bar">
    <button class="chip active" onclick="setFilter(this,'any')">Any price</button>
    <button class="chip" onclick="setFilter(this,'sub1m')">Under $1M</button>
    <button class="chip" onclick="setFilter(this,'1m10m')">$1M – $10M</button>
    <button class="chip" onclick="setFilter(this,'10mplus')">$10M+</button>
  </div>
  <div class="listings" id="listing-list"></div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>
  <div class="map-legend" id="legend-type">
    <div class="legend-title">Asset type</div>
    <div class="legend-row"><div class="legend-dot" style="background:#3b82f6"></div>Residential</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div>Commercial</div>
    <div class="legend-row"><div class="legend-dot" style="background:#10b981"></div>Land</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316"></div>Business</div>
  </div>
  <div class="heatmap-legend" id="legend-heat">
    <div class="legend-title">Price / sqft</div>
    <div class="hm-gradient"></div>
    <div class="hm-labels"><span>$50</span><span>$500</span><span>$5k+</span></div>
  </div>
  <div class="map-controls">
    <button class="mc-btn active" id="btn-satellite" onclick="setStyle('satellite')">Satellite</button>
    <button class="mc-btn" id="btn-street" onclick="setStyle('street')">Street</button>
    <button class="mc-btn" id="btn-dark" onclick="setStyle('dark')">Dark</button>
    <button class="mc-btn" id="btn-heat" onclick="toggleHeat()">Heat Map</button>
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right">
  <div class="detail-top" id="detail-top">
    <div style="color:var(--text-muted);font-size:11px;">Select a listing to view details</div>
  </div>
  <div id="detail-body" class="detail-scroll">
    <div class="detail-empty">
      <div class="detail-empty-icon">◎</div>
      <p>Click any marker on the map<br>or a listing on the left</p>
    </div>
  </div>
</div>

</div>

<!-- TOOLTIP -->
<div id="tt">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-price" id="tt-price"></div>
  <div class="tt-loc" id="tt-loc"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box" id="modal-inner"></div>
</div>

<!-- NOTIF -->
<div id="notif" id="notif-box"></div>

<!-- TICKER -->
<div id="ticker"><div class="ticker-inner" id="ticker-inner"></div></div>

<script>
// ── DATA (structured identically to what a scraper returns) ──
const DATA = [
  { id:1,  name:"Beachfront Villa",           type:"residential", city:"Marbella",      country:"Spain",       lat:36.510, lng:-4.882, ask:4200000,  bid:3800000,  sqft:5200,    beds:6,  baths:7,  yr:2019, cap:null, rev:null,    src:"Registro Propiedad ES", days:34  },
  { id:2,  name:"Tech Office Campus",         type:"commercial",  city:"Lisbon",        country:"Portugal",    lat:38.717, lng:-9.142, ask:12500000, bid:11000000, sqft:28000,   beds:null,baths:null,yr:2015, cap:6.2,  rev:null,    src:"Registo Comercial PT",  days:88  },

const TYPE_COLOR = { residential:'#3b82f6', commercial:'#f59e0b', land:'#10b981', business:'#f97316' };
const TYPE_BADGE = { residential:'badge-residential', commercial:'badge-commercial', land:'badge-land', business:'badge-business' };

let activeTab = 'all', activeFilter = 'any', activeId = null, heatOn = false, query = '';

function fmt(n) {
  if (!n && n!==0) return '—';
  if (n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if (n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if (n>=1e3) return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n;
}

function filtered() {
  return DATA.filter(l => {
    if (activeTab !== 'all' && l.type !== activeTab) return false;
    if (activeFilter === 'sub1m' && l.ask >= 1e6) return false;
    if (activeFilter === '1m10m' && (l.ask < 1e6 || l.ask > 10e6)) return false;
    if (activeFilter === '10mplus' && l.ask <= 10e6) return false;
    if (query) {
      const q = query.toLowerCase();
      if (![l.name,l.city,l.country,l.type].some(s => s.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

function renderList() {
  const list = filtered();
  document.getElementById('s-count').textContent = list.length.toLocaleString();
  const cap = list.reduce((s,l)=>s+l.ask,0);
  document.getElementById('s-cap').textContent = fmt(cap);

  document.getElementById('listing-list').innerHTML = list.map(l=>`
    <div class="card ${activeId===l.id?'active':''}" onclick="select(${l.id})">
      <span class="card-badge ${TYPE_BADGE[l.type]}">${l.type}</span>
      <div class="card-row">
        <div class="card-name">${l.name}</div>
        <div class="card-price">${fmt(l.ask)}</div>
      </div>
      <div class="card-loc">${l.city}, ${l.country}</div>
      <div class="card-spread">
        <span class="spread-label">Bid</span><span class="spread-item spread-bid">${fmt(l.bid)}</span>
        <span style="color:var(--border-strong);margin:0 2px">|</span>
        <span class="spread-label">Ask</span><span class="spread-item spread-ask">${fmt(l.ask)}</span>
      </div>
      <div class="card-source">${l.src} · ${l.days}d listed</div>
    </div>
  `).join('');
}

function select(id) {
  activeId = id;
  renderList();
  const l = DATA.find(x=>x.id===id);
  renderDetail(l);
  map.flyTo({ center:[l.lng,l.lat], zoom:10, duration:1200, essential:true });
}

function renderDetail(l) {
  const spread = l.ask - l.bid;
  const spreadPct = ((spread/l.ask)*100).toFixed(1);

  document.getElementById('detail-top').innerHTML = `
    <span class="card-badge ${TYPE_BADGE[l.type]}" style="margin-bottom:8px;display:inline-block">${l.type}</span>
    <div class="d-name">${l.name}</div>
    <div class="d-loc">${l.city}, ${l.country}</div>
    <div class="d-price-row">
      <div class="d-price">${fmt(l.ask)}</div>
      <div class="d-psf">${l.sqft ? fmt(Math.round(l.ask/l.sqft))+'/sqft' : ''}</div>
    </div>
  `;

  let rows = '';
  if (l.sqft) rows += row('Size', l.sqft.toLocaleString() + ' sqft');
  if (l.beds) rows += row('Beds / Baths', l.beds + ' / ' + l.baths);
  if (l.yr)   rows += row('Year', l.yr);
  if (l.cap)  rows += row('Cap Rate', l.cap + '%');
  if (l.rev)  rows += row('Annual Revenue', fmt(l.rev));
  rows += row('Days Listed', l.days + 'd');
  rows += `<div class="data-row"><span class="data-key">Source</span><span class="data-val source">${l.src}</span></div>`;

  const pct = (v,max)=>Math.min(98,Math.round(v/max*100));
  const mktPct = Math.floor(30+Math.random()*50);
  const viewsN = Math.floor(80+Math.random()*1800);

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-inner">
      <div class="verified"><div class="verified-dot"></div>Verified public record</div>

      <div class="ba-box">
        <div class="ba-cols">
          <div class="ba-col">
            <div class="ba-col-label">Best Bid</div>
            <div class="ba-col-val bid-color">${fmt(l.bid)}</div>
          </div>
          <div class="ba-divider"></div>
          <div class="ba-col">
            <div class="ba-col-label">Ask Price</div>
            <div class="ba-col-val ask-color">${fmt(l.ask)}</div>
          </div>
        </div>
        <div class="spread-info">Spread ${fmt(spread)} · ${spreadPct}%</div>
      </div>

      <div class="action-grid">
        <button class="action-btn a-buy" onclick="notify('Buy order submitted — KYC required to complete')">Buy now</button>
        <button class="action-btn a-bid" onclick="notify('Bid placed — seller notified')">Place bid</button>
        <button class="action-btn a-contact" onclick="notify('Message sent to listing party')">Contact</button>
        <button class="action-btn a-save" onclick="notify('Saved to watchlist')">Watchlist</button>
      </div>

      <div class="section">
        <div class="section-title">Property data</div>
        ${rows}
      </div>

      <div class="section">
        <div class="section-title">Market position</div>
        ${barRow('Price/sqft', mktPct, '#3b82f6', mktPct+'th %ile')}
        ${barRow('Days listed', pct(l.days,250), '#f59e0b', l.days+'d')}
        ${barRow('Views (7d)', pct(viewsN,2000), '#f97316', viewsN.toLocaleString())}
      </div>

      <div class="section">
        <div class="ai-label">AI Deal Brief</div>
        <div class="ai-brief">${brief(l, spreadPct)}</div>
      </div>
    </div>
  `;
}

function row(k,v) {
  return `<div class="data-row"><span class="data-key">${k}</span><span class="data-val">${v}</span></div>`;
}
function barRow(label, pct, color, stat) {
  return `<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="bar-stat" style="color:${color}">${stat}</div>
  </div>`;
}
function brief(l, sp) {
  if (l.type==='business') return `Revenue multiple: ${l.rev?(l.ask/l.rev).toFixed(1)+'×':'N/A'}. ${sp}% negotiation room signals motivated seller. Recommend 90-day LOI with seller financing inquiry and earnout clause.`;
  if (l.type==='land') return `Raw land with ${sp}% bid-ask spread. Pure appreciation or development play. Verify zoning via local registry before offer.`;
  if (l.cap) return `Cap rate ${l.cap}% is ${l.cap>7?'above':'below'} regional average. ${sp}% spread. Stabilized income asset — seller may accept ${fmt(Math.round(l.bid*1.05/1000)*1000)} on direct approach.`;
  return `${sp}% spread from best bid. Seller likely flexible at ${fmt(Math.round((l.bid+l.ask)/2/1000)*1000)}. Direct negotiation recommended — skip the broker.`;
}

// ── TABS / FILTERS ──
function setTab(el, t) {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active'); activeTab=t; renderList();
}
function setFilter(el, f) {
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  el.classList.add('active'); activeFilter=f; renderList();
}
document.getElementById('search-input').addEventListener('input', e=>{query=e.target.value;renderList();});

// ── MAP ──
const MAP_STYLES = {
  satellite: 'https://tiles.openfreemap.org/styles/positron',
  street:    'https://tiles.openfreemap.org/styles/liberty',
  dark:      'https://tiles.openfreemap.org/styles/dark',
};

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  center: [20, 25],
  zoom: 2.2,
  attributionControl: false,
});
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

const markers = {};

map.on('load', () => {
  DATA.forEach(l => {
    const el = document.createElement('div');
    const size = Math.max(10, Math.min(22, 10 + Math.log10(l.ask/100000)*3));
    el.style.cssText = `
      width:${size}px; height:${size}px; border-radius:50%;
      background:${TYPE_COLOR[l.type]}; cursor:pointer;
      border:2px solid rgba(255,255,255,.3);
      box-shadow:0 0 0 2px ${TYPE_COLOR[l.type]}44;
      transition:transform .15s;
    `;
    el.addEventListener('mouseenter', e => {
      el.style.transform = 'scale(1.4)';
      showTT(l, e.clientX, e.clientY);
    });
    el.addEventListener('mouseleave', () => {
      el.style.transform = 'scale(1)';
      document.getElementById('tt').classList.remove('show');
    });
    el.addEventListener('mousemove', e => moveTT(e.clientX, e.clientY));
    el.addEventListener('click', () => select(l.id));

    const m = new maplibregl.Marker({ element: el }).setLngLat([l.lng, l.lat]).addTo(map);
    markers[l.id] = { marker: m, el, listing: l, defaultColor: TYPE_COLOR[l.type], size };
  });
});

function showTT(l, x, y) {
  const tt = document.getElementById('tt');
  document.getElementById('tt-name').textContent = l.name;
  document.getElementById('tt-price').textContent = fmt(l.ask) + ' ask · ' + fmt(l.bid) + ' bid';
  document.getElementById('tt-loc').textContent = l.city + ', ' + l.country;
  tt.classList.add('show');
  moveTT(x,y);
}
function moveTT(x,y) {
  const tt = document.getElementById('tt');
  tt.style.left = (x+14)+'px'; tt.style.top = (y-12)+'px';
}

function setStyle(s) {
  document.querySelectorAll('.mc-btn[id^=btn-]').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s).classList.add('active');
  map.setStyle(MAP_STYLES[s] || MAP_STYLES.satellite);
}

function toggleHeat() {
  heatOn = !heatOn;
  document.getElementById('btn-heat').classList.toggle('active', heatOn);
  document.getElementById('legend-type').style.display = heatOn ? 'none' : 'block';
  document.getElementById('legend-heat').style.display = heatOn ? 'block' : 'none';
  Object.values(markers).forEach(({el, listing, defaultColor, size}) => {
    if (heatOn) {
      const psf = listing.sqft ? listing.ask/listing.sqft : 500;
      const t = Math.min(1, Math.log(psf/50)/Math.log(100));
      const h = Math.round((1-t)*240);
      const c = `hsl(${h},90%,55%)`;
      el.style.background = c; el.style.boxShadow = `0 0 0 2px ${c}44`;
    } else {
      el.style.background = defaultColor; el.style.boxShadow = `0 0 0 2px ${defaultColor}44`;
    }
  });
}

// ── MODALS ──
function openModal(type) {
  document.getElementById('modal-inner').innerHTML = type==='list' ? listModal() : kycModal();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

function listModal() { return `
  <div class="modal-title">List your asset</div>
  <div class="modal-sub">Direct listing — no broker commission. KYC required to publish.</div>
  <div class="field-row">
    <div class="field"><label>Asset type</label><select><option>Residential</option><option>Commercial</option><option>Land</option><option>Business</option></select></div>
    <div class="field"><label>Country</label><input type="text" placeholder="e.g. Spain"></div>
  </div>
  <div class="field"><label>Name / Address</label><input type="text" placeholder="Property or business name"></div>
  <div class="field-row">
    <div class="field"><label>Ask price (USD)</label><input type="number" placeholder="0"></div>
    <div class="field"><label>Minimum bid (USD)</label><input type="number" placeholder="0"></div>
  </div>
  <div class="field-row">
    <div class="field"><label>Size (sqft)</label><input type="text" placeholder="optional"></div>
    <div class="field"><label>Annual revenue</label><input type="text" placeholder="if applicable"></div>

  <div class="field"><label>Public registry URL</label><input type="text" placeholder="Link to official public record"></div>
  <div class="modal-footer">
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    <button class="modal-submit" onclick="closeModal();notify('Listing submitted — pending KYC review')">Submit listing</button>
  </div>
`; }

function kycModal() { return `
  <div class="modal-title">Verify your identity</div>
  <div class="modal-sub">One-time KYC verification required to bid, buy, or contact sellers.</div>
  <div class="field-row">
    <div class="field"><label>First name</label><input type="text" placeholder="First"></div>
    <div class="field"><label>Last name</label><input type="text" placeholder="Last"></div>
  </div>
  <div class="field"><label>Email</label><input type="email" placeholder="you@example.com"></div>
  <div class="field"><label>Country of residence</label><select><option>United States</option><option>United Kingdom</option><option>Germany</option><option>Spain</option><option>UAE</option><option>Other</option></select></div>
  <div class="field"><label>Available funds (USD)</label><input type="number" placeholder="Proof of funds"></div>
  <div class="modal-footer">
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    <button class="modal-submit" onclick="closeModal();notify('KYC started — check your email to continue')">Begin verification</button>
  </div>
`; }

// ── NOTIF ──
let notifT;
function notify(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg; n.style.display = 'block';
  clearTimeout(notifT); notifT = setTimeout(()=>n.style.display='none', 3500);
}

// ── TICKER ──
const tickerHTML = [...DATA,...DATA].map(l=>`<span class="ti">${l.city} · ${l.name} <span class="p ${l.ask>5e6?'dn':'up'}">${fmt(l.ask)}</span></span>`).join('');
const ti = document.getElementById('ticker-inner');
ti.innerHTML = tickerHTML + tickerHTML;

// ── INIT ──
renderList();
setTimeout(()=>select(1), 1200);
</script>
