<style>
/* CLINICAL SEC/10-K AESTHETIC - Institutional Grade */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0e17;
  --bg1:      #0f1420;
  --bg2:      #151c2a;
  --bg3:      #1a2233;
  --bg4:      #1f2a3d;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.12);
  --border3:  rgba(255,255,255,.2);
  --text:     #e8edf5;
  --muted:    #6b7c93;
  --dim:      #9aabc0;
  --cyan:     #00d4aa;
  --cyan-dim: rgba(0,212,170,.1);
  --silver:   #cdd9f4;
  --gold:     #d4af37;
  --red:      #ff5a5a;
  --blue:     #5a9eff;
  --green:    #3ee688;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
}

#shell {
  display: grid;
  grid-template-rows: 32px 56px 1fr 32px;
  height: 100vh;
  min-height: 0;
}

#topbar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.logo-mark {
  width: 8px; height: 8px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--cyan);
}
.logo-text {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.2px;
  color: var(--text);
}
.logo-tag {
  font-size: 8px;
  color: var(--muted);
  letter-spacing: 1.5px;
  font-weight: 500;
}

.search-wrap {
  flex: 1;
  position: relative;
}
#search-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 8px 16px;
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  border-radius: 4px;
  outline: none;
}
#search-input:focus { border-color: var(--cyan); }
#search-input::placeholder { color: var(--muted); }

.topbar-right {
  display: flex;
  gap: 4px;
}
.tstat {
  padding: 0 12px;
  text-align: right;
  border-left: 1px solid var(--border);
}
.tstat-l {
  font-size: 8px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
}
.tstat-v {
  font-size: 13px;
  font-weight: 700;
  color: var(--silver);
}
.tbtn {
  padding: 6px 14px;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 4px;
}
.tbtn:hover { background: rgba(255,255,255,.05); }
.tbtn.primary {
  background: var(--cyan);
  color: #000;
}
.tbtn.primary:hover { background: #00b898; }

#main-row {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 0;
  overflow: hidden;
}

#left {
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.left-head {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.left-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--cyan);
  margin-bottom: 12px;
}

.ptabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 12px;
}
.ptab {
  padding: 6px 10px;
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: none;
  border: none;
  color: var(--dim);
  cursor: pointer;
  border-radius: 3px;
}
.ptab.on {
  background: var(--cyan-dim);
  color: var(--cyan);
}
.frow {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.fchip {
  padding: 4px 10px;
  font-size: 9px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--dim);
  cursor: pointer;
  border-radius: 3px;
}
.fchip.on {
  border-color: var(--cyan);
  color: var(--cyan);
  background: var(--cyan-dim);
}

.list-scroll {
  flex: 1;
  overflow-y: auto;
}
.pcard {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
}
.pcard:hover { background: rgba(255,255,255,.02); }
.pcard.active {
  background: var(--cyan-dim);
  border-left: 2px solid var(--cyan);
}
.pcard-addr {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.pcard-city {
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 6px;
}
.pcard-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.pcard-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
}
.pcard-type {
  font-size: 8px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  background: rgba(255,255,255,.05);
}

#map-col {
  position: relative;
  background: #000;
  overflow: hidden;
}
#map3d-container {
  position: absolute;
  inset: 0;
}
gmp-map-3d {
  width: 100%;
  height: 100%;
  display: block;
}

/* CLINICAL PRICE MARKER - SEC 10-K AESTHETIC */
.price-marker {
  position: absolute;
  pointer-events: auto;
  cursor: pointer;
  z-index: 100;
  transform: translate(-50%, -100%);
  transition: transform 0.15s ease, filter 0.15s ease;
}
.price-marker:hover {
  transform: translate(-50%, -100%) scale(1.05);
  filter: drop-shadow(0 4px 12px rgba(0,212,170,0.3));
}
.marker-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 8px 12px;
  min-width: 100px;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.marker-price {
  font-size: 13px;
  font-weight: 800;
  color: var(--cyan);
  letter-spacing: -0.2px;
  font-family: 'Inter', monospace;
}
.marker-type {
  font-size: 7px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 2px;
}
.marker-address {
  font-size: 8px;
  color: var(--dim);
  margin-top: 3px;
  max-width: 140px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.marker-stem {
  width: 1px;
  height: 16px;
  background: linear-gradient(to bottom, var(--cyan), transparent);
  margin: 0 auto;
}
.marker-dot {
  width: 6px;
  height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  margin: 0 auto;
  box-shadow: 0 0 6px var(--cyan);
}

/* Right panel - Clinical */
#right {
  position: fixed;
  right: 0;
  top: 88px;
  bottom: 32px;
  width: 360px;
  background: var(--bg1);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 200;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#right.open {
  transform: translateX(0);
}
.rhead {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
.rtype {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--cyan);
  margin-bottom: 4px;
}
.rname {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 4px;
}
.rcity {
  font-size: 11px;
  color: var(--dim);
  margin-bottom: 8px;
}
.rprice {
  font-size: 20px;
  font-weight: 800;
  color: var(--cyan);
}
.rbody {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.drawer-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 18px;
  cursor: pointer;
}
.rrow {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.rk { color: var(--muted); }
.rv { color: var(--silver); font-weight: 500; }
.rv.hl { color: var(--cyan); font-weight: 700; }

#toast {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg2);
  border: 1px solid var(--cyan);
  padding: 8px 20px;
  font-size: 11px;
  color: var(--cyan);
  border-radius: 4px;
  z-index: 10000;
  display: none;
  white-space: nowrap;
}

.auth-gate {
  position: fixed;
  inset: 0;
  background: rgba(10,14,23,0.98);
  backdrop-filter: blur(8px);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-gate.hidden { display: none; }
.auth-gate-card {
  background: var(--bg1);
  border: 1px solid var(--border2);
  padding: 32px 40px;
  max-width: 400px;
  text-align: center;
}
.auth-gate-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.auth-gate-sub {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 24px;
}
.auth-gate-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.auth-gate-btn {
  padding: 10px 24px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  border-radius: 4px;
}
.auth-gate-btn.primary {
  background: var(--cyan);
  color: #000;
}
.auth-gate-btn.secondary {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--silver);
}
</style>

      </div>

<div class="auth-gate" id="auth-gate">
  <div class="auth-gate-card">

      <button class="auth-gate-btn secondary" onclick="document.getElementById('auth-gate').classList.add('hidden'); openModal('register')">Request Access</button>
      <button class="auth-gate-btn primary" onclick="document.getElementById('auth-gate').classList.add('hidden'); openModal('signin')">Sign In</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============================================================
// CONFIGURATION
// ============================================================
const SB_URL = 'https://iyejqvdjbvokrswlsoda.supabase.co';
const SB_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZWpxdmRqYnZva3Jzd2xzb2RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjA0NzMsImV4cCI6MjA5MTM5NjQ3M30.Zj6-6NKQh2cOXrI2lRYCiLehoKsselKFjhlVWTLGMqc';

let mapElement = null;
let markers = [];
let assets = [];
let activeAssetId = null;
let activeFilter = 'any';
let activeCategory = 'all';
let _sb = null;
let isAuthenticated = false;

// Altitude offset (meters) for markers - prevents clipping into terrain
const ALTITUDE_OFFSET = 25;

// ============================================================
// SUPABASE INITIALIZATION
// ============================================================
function bootSupabase() {
  if (typeof supabase !== 'undefined' && supabase.createClient) {
    try {
      _sb = supabase.createClient(SB_URL, SB_ANON_KEY);
      console.log('[RWABidAsk] Supabase client ready');
      restoreSession();
      fetchListings();
    } catch(e) { console.warn(e); }
  } else {
    setTimeout(bootSupabase, 300);
  }
}

async function restoreSession() {
  if (!_sb) return;
  const { data } = await _sb.auth.getSession();
  if (data?.session?.user) {
    isAuthenticated = true;
    document.getElementById('auth-gate')?.classList.add('hidden');
  }
}

// ============================================================
// FETCH LISTINGS FROM SUPABASE
// ============================================================
async function fetchListings() {
  if (!_sb) {
    console.warn('[RWABidAsk] Supabase not ready, retrying...');
    setTimeout(fetchListings, 500);
    return;
  }
  
  try {
    const { data, error } = await _sb
      .from('listings')
      .select('*')
      .eq('status', 'active')
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    if (!data || data.length === 0) {
      console.log('[RWABidAsk] No listings found');
      document.getElementById('list-scroll').innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:11px">No assets in ledger<br>Add listings via dashboard</div>';
      return;
    }
    
    assets = data.map(row => ({
      id: row.id,
      address: row.address || 'Address not specified',
      city: row.city || 'Unknown',
      country: row.country || 'Global',
      lat: parseFloat(row.latitude) || parseFloat(row.lat) || 0,
      lng: parseFloat(row.longitude) || parseFloat(row.lng) || 0,
      price: parseFloat(row.price) || 0,
      type: (row.asset_type || row.type || 'residential').toLowerCase(),
      sqft: row.sqft ? parseInt(row.sqft) : null,
      description: row.description || null,
      image_url: row.image_url || null,
      tokenized: row.tokenized === true
    })).filter(a => a.lat !== 0 && a.lng !== 0);
    
    console.log(`[RWABidAsk] Loaded ${assets.length} assets`);
    updateUI();
    
    // If map is ready, render markers
    if (mapElement && mapElement.steadyState) {
      renderMarkers();
    }
  } catch (err) {
    console.error('[RWABidAsk] Fetch error:', err);
  }
}

function updateUI() {
  document.getElementById('s-assets').textContent = assets.length;
  document.getElementById('s-gmc').textContent = formatPrice(assets.reduce((s,a) => s + a.price, 0));
  renderCategoryTabs();
  renderAssetList(assets);
}

function formatPrice(n) {
  if (!n) return '$—';
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + n.toLocaleString();
}

function renderCategoryTabs() {
  const categories = [
    { id: 'all', label: 'ALL' },
    { id: 'realestate', label: 'REAL ESTATE' },
    { id: 'commercial', label: 'COMMERCIAL' },
    { id: 'aviation', label: 'AVIATION' },
    { id: 'maritime', label: 'MARITIME' },
    { id: 'resources', label: 'RESOURCES' }
  ];
  const container = document.getElementById('category-tabs');
  if (!container) return;
  container.innerHTML = categories.map(cat => `
    <button class="ptab ${activeCategory === cat.id ? 'on' : ''}" data-cat="${cat.id}">${cat.label}</button>
  `).join('');
  container.querySelectorAll('.ptab').forEach(btn => {
    btn.addEventListener('click', () => setCategory(btn.dataset.cat));
  });
}

function setCategory(catId) {
  activeCategory = catId;
  renderCategoryTabs();
  const filtered = filterAssets(assets);
  renderAssetList(filtered);
}

function setFilter(el, filter) {
  document.querySelectorAll('.fchip').forEach(f => f.classList.remove('on'));
  el.classList.add('on');
  activeFilter = filter;
  const filtered = filterAssets(assets);
  renderAssetList(filtered);
}

function filterAssets(list) {
  let filtered = list;
  if (activeCategory !== 'all') {
    const typeMap = { realestate: ['residential', 'land'], commercial: ['commercial', 'business'], aviation: ['aviation'], maritime: ['maritime'], resources: ['resources', 'minerals', 'energy'] };
    const validTypes = typeMap[activeCategory] || [];
    filtered = filtered.filter(a => validTypes.includes(a.type));
  }
  if (activeFilter === 'sub1m') filtered = filtered.filter(a => a.price < 1e6);
  else if (activeFilter === '1m5m') filtered = filtered.filter(a => a.price >= 1e6 && a.price <= 5e6);
  else if (activeFilter === '5m25m') filtered = filtered.filter(a => a.price > 5e6 && a.price <= 25e6);
  else if (activeFilter === '25mplus') filtered = filtered.filter(a => a.price > 25e6);
  return filtered;
}

function renderAssetList(list) {
  const container = document.getElementById('list-scroll');
  if (!list.length) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:11px">No assets match filters</div>';
    return;
  }
  container.innerHTML = list.map(a => `
    <div class="pcard ${activeAssetId === a.id ? 'active' : ''}" data-id="${a.id}">
      <div class="pcard-addr">${a.address}</div>
      <div class="pcard-city">${a.city}${a.country ? ', ' + a.country : ''}</div>
      <div class="pcard-bottom">
        <div class="pcard-price">${formatPrice(a.price)}</div>
        <div class="pcard-type">${a.type}</div>
      </div>
    </div>
  `).join('');
  container.querySelectorAll('.pcard').forEach(card => {
    card.addEventListener('click', () => selectAsset(card.dataset.id));
  });
}

function selectAsset(id) {
  activeAssetId = id;
  const asset = assets.find(a => a.id === id);
  if (!asset) return;
  renderAssetDetail(asset);
  flyToAsset(asset);
  renderAssetList(filterAssets(assets));
}

function renderAssetDetail(asset) {
  document.getElementById('rhead').innerHTML = `
    <div class="rtype">${asset.type.toUpperCase()}</div>
    <div class="rname">${asset.address}</div>
    <div class="rcity">${asset.city}${asset.country ? ', ' + asset.country : ''}</div>
    <div class="rprice">${formatPrice(asset.price)}${asset.sqft ? ` · ${formatPrice(asset.price / asset.sqft)}/sf` : ''}</div>
  `;
  document.getElementById('rbody').innerHTML = `
    <div class="rrow"><span class="rk">Asset ID</span><span class="rv">${asset.id}</span></div>
    <div class="rrow"><span class="rk">Status</span><span class="rv">Active</span></div>
    ${asset.sqft ? `<div class="rrow"><span class="rk">Size</span><span class="rv">${asset.sqft.toLocaleString()} sqft</span></div>` : ''}
    ${asset.description ? `<div class="rrow"><span class="rk">Description</span><span class="rv">${asset.description}</span></div>` : ''}
    <div class="rrow"><span class="rk">Ledger Status</span><span class="rv ${asset.tokenized ? 'hl' : ''}">${asset.tokenized ? '✓ Registered' : 'Pending'}</span></div>
  `;
  document.getElementById('right').classList.add('open');
}

function closeDrawer() {
  document.getElementById('right').classList.remove('open');
}

// ============================================================
// GOOGLE MAPS 3D - CRITICAL FIX
// ============================================================
async function initMap() {
  try {
    const mapDiv = document.getElementById('map3d-container');
    const { Map3DElement } = await google.maps.importLibrary('maps3d');
    
    mapElement = new Map3DElement({
      center: { lat: 39.5, lng: -98.0, altitude: 0 },
      range: 8000000,
      tilt: 0,
      heading: 0,
      mode: 'SATELLITE'
    });
    
    mapDiv.appendChild(mapElement);
    
    // CRITICAL FIX: Wait for steady state before rendering markers
    // This prevents markers from being cleared by the map's initialization
    mapElement.addEventListener('gmp-steadystate', () => {
      console.log('[RWABidAsk] Map steady state reached');
      if (assets.length) {
        renderMarkers();
      }
    });
    
    // Also handle camera changes for marker reprojection
    mapElement.addEventListener('gmp-centerchange', () => updateMarkerPositions());
    mapElement.addEventListener('gmp-rangechange', () => updateMarkerPositions());
    mapElement.addEventListener('gmp-tiltchange', () => updateMarkerPositions());
    mapElement.addEventListener('gmp-headingchange', () => updateMarkerPositions());
    
    console.log('[RWABidAsk] Map 3D initialized');
    
  } catch (err) {
    console.error('[RWABidAsk] Map init error:', err);
  }
}

// ============================================================
// RENDER CSS2D MARKERS WITH ALTITUDE OFFSET
// ============================================================
async function renderMarkers() {
  if (!mapElement || !assets.length) return;
  
  // Clear existing markers
  markers.forEach(marker => {
    if (marker.element) marker.element.remove();
  });
  markers = [];
  
  // Get altitude service for elevation data
  let altitudeService = null;
  try {
    const { AltitudeService } = await google.maps.importLibrary('maps3d');
    altitudeService = new AltitudeService();
  } catch(e) { console.warn('[RWABidAsk] AltitudeService not available'); }
  
  // Create marker for each asset
  for (const asset of assets) {
    let altitude = ALTITUDE_OFFSET; // Default offset
    
    // Get actual terrain altitude if service available
    if (altitudeService) {
      try {
        const result = await altitudeService.getAltitudeForLatLng({ lat: asset.lat, lng: asset.lng });
        altitude = result.altitude + ALTITUDE_OFFSET;
      } catch(e) { console.warn(`Altitude fetch failed for ${asset.address}`); }
    }
    
    const markerElement = createMarkerElement(asset);
    const position = { lat: asset.lat, lng: asset.lng, altitude: altitude };
    
    // Create marker using Map3DElement's marker API
    // Fallback to DOM positioning if marker API not available
    if (mapElement.addMarker) {
      const marker = mapElement.addMarker({ position, element: markerElement });
      markers.push(marker);
    } else {
      // Manual DOM positioning (fallback)
      markerElement.style.position = 'absolute';
      document.getElementById('map3d-container').appendChild(markerElement);
      markers.push({ element: markerElement, asset, position });
    }
  }
  
  updateMarkerPositions();
  console.log(`[RWABidAsk] Rendered ${markers.length} markers`);
}

function createMarkerElement(asset) {
  const div = document.createElement('div');
  div.className = 'price-marker';
  div.setAttribute('data-id', asset.id);
  div.innerHTML = `
    <div class="marker-card">
      <div class="marker-price">${formatPrice(asset.price)}</div>
      <div class="marker-type">${asset.type.toUpperCase()}</div>
      <div class="marker-address">${asset.address.substring(0, 35)}${asset.address.length > 35 ? '…' : ''}</div>
    </div>
    <div class="marker-stem"></div>
    <div class="marker-dot"></div>
  `;
  
  div.addEventListener('click', (e) => {
    e.stopPropagation();
    selectAsset(asset.id);
    flyToAsset(asset);
  });
  
  return div;
}

function updateMarkerPositions() {
  if (!mapElement || !mapElement.getCenter) return;
  
  const center = mapElement.getCenter();
  const range = mapElement.range || 8000000;
  const tilt = mapElement.tilt || 0;
  const heading = mapElement.heading || 0;
  
  markers.forEach(marker => {
    if (!marker.element) return;
    
    const pos = marker.position || { lat: marker.asset.lat, lng: marker.asset.lng, altitude: ALTITUDE_OFFSET };
    
    // Project 3D position to screen coordinates
    // This is a simplified projection - for production, use mapElement.projectToScreen()
    if (mapElement.projectToScreen) {
      try {
        const screenPos = mapElement.projectToScreen(pos);
        if (screenPos && screenPos.x && screenPos.y) {
          marker.element.style.transform = `translate(-50%, -100%) translate(${screenPos.x}px, ${screenPos.y}px)`;
          marker.element.style.display = 'flex';
        } else {
          marker.element.style.display = 'none';
        }
      } catch(e) {
        marker.element.style.display = 'none';
      }
    }
  });
}

function flyToAsset(asset) {
  if (!mapElement) return;
  try {
    mapElement.flyCameraTo({
      endCamera: {
        center: { lat: asset.lat, lng: asset.lng, altitude: ALTITUDE_OFFSET + 50 },
        range: 800,
        tilt: 55,
        heading: 0
      },
      durationMillis: 1800
    });
  } catch(e) {
    console.warn('Fly to failed:', e);
  }
}

// SEARCH
// ============================================================
function initPlacesSearch() {
  const input = document.getElementById('search-input');
  if (!input) return;
  
  input.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const query = input.value.trim();
      if (query) performSearch(query);
    }
  });
}

function performSearch(query) {
  const results = assets.filter(a => 
    a.address.toLowerCase().includes(query.toLowerCase()) ||
    a.city.toLowerCase().includes(query.toLowerCase()) ||
    a.type.toLowerCase().includes(query.toLowerCase())
  );
  renderAssetList(results);
  if (results.length === 1) selectAsset(results[0].id);
}

document.getElementById('search-input').addEventListener('input', (e) => {
  if (!e.target.value.trim()) renderAssetList(filterAssets(assets));
});
